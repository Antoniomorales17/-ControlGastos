<div class="flex flex-col gap-3">
  <div class="bg-white rounded-2xl p-5 shadow-sm">
    <h3 class="font-medium text-gray-700 mb-4">Presupuestos por categoría</h3>
    @for (c of categories; track c.id) {
      <div class="flex items-center gap-3 py-2.5 border-b border-gray-100 last:border-0">
        <div class="w-8 h-8 rounded-lg flex items-center justify-center text-white text-xs font-bold"
             [style.background]="c.color">
          {{ c.name.substring(0,2).toUpperCase() }}
        </div>
        <span class="font-medium flex-1 text-sm">{{ c.name }}</span>
        <input type="number" [(ngModel)]="c.budget" (change)="save()" placeholder="0"
               class="w-28 p-2 border border-gray-200 rounded-lg text-sm outline-none focus:border-blue-400 text-right">
      </div>
    }
  </div>
</div>
