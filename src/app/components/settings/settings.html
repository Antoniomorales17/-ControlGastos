<div class="flex flex-col gap-3">
  <div class="bg-white rounded-2xl p-5 shadow-sm">
    <h3 class="font-medium text-gray-700 mb-2">Datos</h3>
    <p class="text-gray-500 text-sm mb-4 leading-relaxed">Tus datos se guardan localmente en este dispositivo. Nadie más puede acceder a ellos.</p>
    <div class="flex gap-3 flex-wrap">
      <button (click)="exportData()" class="border border-blue-600 text-blue-600 rounded-xl px-4 py-2 text-sm font-medium flex items-center gap-2 hover:bg-blue-50 transition cursor-pointer">
        <span class="material-icons text-lg">download</span> Exportar datos
      </button>
      <button (click)="clearData()" class="border border-red-500 text-red-500 rounded-xl px-4 py-2 text-sm font-medium flex items-center gap-2 hover:bg-red-50 transition cursor-pointer">
        <span class="material-icons text-lg">delete_forever</span> Eliminar todo
      </button>
    </div>
  </div>

  <div class="bg-white rounded-2xl p-5 shadow-sm">
    <h3 class="font-medium text-gray-700 mb-2">App instalable</h3>
    <p class="text-gray-500 text-sm leading-relaxed">En Chrome pulsa ⋮ → "Añadir a pantalla de inicio" para usar la app sin conexión.</p>
  </div>
</div>
